services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://control_plane:pw@db:5432/control_plane
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: control_plane
      POSTGRES_USER: control_plane
      POSTGRES_PASSWORD: pw
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control_plane -d control_plane"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
